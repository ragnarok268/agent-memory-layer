name: knowledge-artifacts

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Run tests
        run: python -m pytest

      - name: Run guardrail runner demo
        run: python automation/guardrail_runner.py --changed README.md pyproject.toml automation/guardrail_runner.py
