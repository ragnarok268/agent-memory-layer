id: SCP-0102
layer: event
type: user_reversal
status: active
title: Reject generic project memory framing
decision: SCP should not be framed primarily as project memory, documentation, or generic ADR automation.
why: Those framings caused evaluators to compare SCP to existing memory banks, documentation tools, and ADR systems instead of evaluating the embedded Canon and AI-maintained decision preservation model.
evidence:
  - README now leads with decision preservation from adoption forward.
  - Canon documentation defines preservation-worthy events and field meanings.
constraints:
  - Keep public wording simple.
  - Avoid implying retroactive reconstruction.
  - Avoid implying SCP preserves every change.
impact: SCP is now positioned around preserving important decisions and reducing rediscovery, not general documentation.
future_trap: Future README edits may drift back toward vague memory or documentation language.
revisit_if:
  - User testing shows people understand the memory framing better than decision preservation.
next: Keep README focused on decisions, rediscovery cost, Canon definitions, and adoption-forward behavior.
effective_from: v0.1
scope: positioning
preservation_value: medium
